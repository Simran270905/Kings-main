<!DOCTYPE html>
<html>
<head>
    <title>Test URL Construction</title>
</head>
<body>
    <h1>Track Order URL Construction Test</h1>
    <div id="output"></div>
    
    <script>
        // Simulate the same URL construction as TrackOrderPage
        const VITE_API_URL = 'http://localhost:5000/api';
        const phoneNumber = '1234567890';
        const url = `${VITE_API_URL}/api/orders/track-by-phone?phone=${encodeURIComponent(phoneNumber)}`;
        
        document.getElementById('output').innerHTML = `
            <h2>Environment Variables:</h2>
            <p><strong>VITE_API_URL:</strong> ${VITE_API_URL}</p>
            
            <h2>URL Construction:</h2>
            <p><strong>Phone Number:</strong> ${phoneNumber}</p>
            <p><strong>Encoded Phone:</strong> ${encodeURIComponent(phoneNumber)}</p>
            <p><strong>Final URL:</strong> ${url}</p>
            
            <h2>Test API Call:</h2>
            <button onclick="testAPI()">Test API Call</button>
            <div id="apiResult"></div>
        `;
        
        async function testAPI() {
            try {
                console.log('Testing URL:', url);
                const response = await fetch(url);
                const data = await response.json();
                console.log('API Response:', data);
                document.getElementById('apiResult').innerHTML = `
                    <h3>API Response:</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('apiResult').innerHTML = `<h3>Error:</h3><pre>${error.message}</pre>`;
            }
        }
    </script>
</body>
</html>
