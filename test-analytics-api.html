<!DOCTYPE html>
<html>
<head>
    <title>Analytics API Test</title>
</head>
<body>
    <h1>Analytics API Test</h1>
    <div id="results"></div>
    
    <script>
    async function testAnalytics() {
        try {
            // Step 1: Login
            console.log('Step 1: Logging in...');
            const loginResponse = await fetch('http://localhost:5000/api/admin/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    email: 'admin@kkings.com',
                    password: 'Kkingsjewellery@11'
                })
            });
            
            const loginData = await loginResponse.json();
            console.log('Login response:', loginData);
            
            if (!loginData.success) {
                throw new Error('Login failed');
            }
            
            const token = loginData.data.token;
            console.log('Token obtained:', token.substring(0, 50) + '...');
            
            // Step 2: Get Analytics
            console.log('Step 2: Getting analytics...');
            const analyticsResponse = await fetch('http://localhost:5000/api/admin/analytics?range=30&period=daily&validate=false&strictPopulate=false', {
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            });
            
            console.log('Analytics response status:', analyticsResponse.status);
            
            const analyticsData = await analyticsResponse.json();
            console.log('Analytics response:', analyticsData);
            
            // Step 3: Display results
            const resultsDiv = document.getElementById('results');
            
            if (analyticsData.success) {
                const summary = analyticsData.data.summary;
                const dateData = analyticsData.data.dateData;
                
                resultsDiv.innerHTML = `
                    <h2>✅ Analytics API Working!</h2>
                    <h3>Summary:</h3>
                    <ul>
                        <li>Total Revenue: ₹${summary.totalRevenue}</li>
                        <li>Total Orders: ${summary.totalOrders}</li>
                        <li>Total Customers: ${summary.totalCustomers}</li>
                        <li>Avg Order Value: ₹${summary.avgOrderValue}</li>
                    </ul>
                    
                    <h3>Daily Sales (First 5 days):</h3>
                    <table border="1" style="border-collapse: collapse;">
                        <tr>
                            <th>Date</th>
                            <th>Orders</th>
                            <th>Revenue</th>
                            <th>Customers</th>
                        </tr>
                        ${Object.entries(dateData).slice(0, 5).map(([date, data]) => `
                            <tr>
                                <td>${date}</td>
                                <td>${data.orders || 0}</td>
                                <td>₹${data.revenue || 0}</td>
                                <td>${data.customers || 0}</td>
                            </tr>
                        `).join('')}
                    </table>
                `;
            } else {
                resultsDiv.innerHTML = `
                    <h2>❌ Analytics API Failed</h2>
                    <p>Error: ${analyticsData.message}</p>
                `;
            }
            
        } catch (error) {
            console.error('Test failed:', error);
            document.getElementById('results').innerHTML = `
                <h2>❌ Test Failed</h2>
                <p>Error: ${error.message}</p>
            `;
        }
    }
    
    // Run test
    testAnalytics();
    </script>
</body>
</html>
